name: slate
description: "A personal task manager"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  supabase_flutter: ^2.9.1
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  go_router: ^14.8.1
  intl: ^0.20.2
  flutter_slidable: ^4.0.3
  shared_preferences: ^2.5.3
  uuid: ^4.5.3
  table_calendar: ^3.1.2
  path: ^1.9.1
  path_provider: ^2.1.5
  sqlite3: ^2.7.5
  sqlite3_flutter_libs: ^0.5.32
  connectivity_plus: ^6.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.4
  freezed: ^2.5.8
  json_serializable: ^6.9.5
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  macos:
    generate: true
    image_path: "assets/icon/slate.png"
  image_path: "assets/icon/slate.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/slate.png
